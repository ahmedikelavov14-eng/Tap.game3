<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хамстер Тапай - Автоматик</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #1c1f24;
            --main-yellow: #f3ba2f;
            --card-bg: #2b2f36;
            --accent-green: #4caf50;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* Шапка */
        .header { text-align: center; margin-bottom: 10px; width: 100%; }
        #level-display { color: var(--accent-green); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; font-size: 14px; }
        #balance { font-size: 48px; font-weight: bold; color: var(--main-yellow); line-height: 1; margin: 5px 0; }
        .record-badge { color: #ffd700; font-size: 14px; opacity: 0.9; }

        /* Хомяк */
        .coin-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .coin-container:active { transform: scale(0.92); }
        .hamster-btn {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #f3ba2f 0%, #a67c00 100%);
            border-radius: 50%;
            border: 6px solid #3e444e;
            display: flex; align-items: center; justify-content: center;
            font-size: 90px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        /* Энергия */
        .energy-section { width: 100%; max-width: 320px; text-align: center; margin-bottom: 20px; }
        .energy-bar {
            width: 100%; height: 14px; background: #3e444e;
            border-radius: 7px; overflow: hidden; margin: 8px 0;
        }
        #energy-fill { width: 100%; height: 100%; background: var(--main-yellow); transition: width 0.2s; }

        /* Меню */
        .tabs { display: flex; gap: 8px; width: 100%; max-width: 420px; }
        .tab-btn {
            flex: 1; padding: 12px 5px; border: none; background: #3e444e;
            color: white; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 11px;
        }
        .tab-btn.active { background: var(--main-yellow); color: black; }

        /* Карточки */
        .shop-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            width: 100%; max-width: 420px; margin-top: 15px;
        }
        .card {
            background: var(--card-bg); padding: 15px; border-radius: 15px;
            text-align: center; border: 1px solid #3e444e; display: flex; flex-direction: column;
        }
        .card h3 { margin: 0; font-size: 13px; }
        .card p { margin: 6px 0; font-size: 10px; color: #888; }
        .card button {
            margin-top: auto; padding: 10px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer;
        }
        .btn-buy { background: var(--main-yellow); color: black; }
        .btn-equip { background: var(--accent-green); color: white; }
        .btn-disabled { background: #555; color: #888; cursor: not-allowed; }

        .hidden { display: none; }

        /* Анимация клика */
        .floating-text {
            position: absolute; color: white; font-weight: bold; font-size: 32px;
            pointer-events: none; animation: floatUp 0.7s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="level-display">Ранг: Загрузка...</div>
        <div id="balance">0</div>
        <div class="record-badge">🏆 Рекорд: <span id="highscore">0</span></div>
        <div style="font-size: 14px; color: #888; margin-top: 5px;">Прибыль: +<span id="pps">0</span> /сек</div>
    </div>

    <div class="coin-container" id="clicker">
        <div class="hamster-btn" id="hamster-view">🐹</div>
    </div>

    <div class="energy-section">
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <small>⚡️ <span id="energy-text">1000</span> / <span id="max-energy-text">1000</span></small>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-upg-btn" onclick="showTab('upgrades')">Бизнес</button>
        <button class="tab-btn" id="tab-ward-btn" onclick="showTab('wardrobe')">Одежда</button>
        <button class="tab-btn" id="tab-friends-btn" onclick="showTab('friends')">Друзья</button>
    </div>

    <div id="tab-upgrades" class="shop-grid"></div>
    <div id="tab-wardrobe" class="shop-grid hidden"></div>
    <div id="tab-friends" class="shop-grid hidden" style="grid-template-columns: 1fr;">
        <div class="card" style="padding: 25px;">
            <h3>Приглашай и зарабатывай</h3>
            <p>За каждого друга по ссылке — <b>1,500</b> монет автоматом!</p>
            <div style="font-size: 60px; margin: 15px;">🤝</div>
            <button class="btn-buy" onclick="inviteFriend()" style="font-size: 16px;">Поделиться ссылкой</button>
            <p style="margin-top: 15px; font-size: 10px;">Бонус начисляется другу при первом входе.</p>
        </div>
    </div>

    <script>
        // --- 1. ДАННЫЕ И МИГРАЦИЯ ---
        const SAVE_KEY = 'ht_final_save_v2';
        const DEFAULT_STATE = {
            balance: 0, highscore: 0, energy: 1000, pps: 0,
            currentSkin: '🐹', ownedSkins: ['🐹'], upgrades: {},
            bonusReceived: false
        };

        let saved = JSON.parse(localStorage.getItem(SAVE_KEY)) || {};
        let state = { ...DEFAULT_STATE, ...saved };

        const levels = [
            { name: "Новичок", threshold: 0 },
            { name: "Тапер-Бронза", threshold: 2000 },
            { name: "Серебряный Хома", threshold: 15000 },
            { name: "Золотой Босс", threshold: 100000 },
            { name: "Король Тапа", threshold: 1000000 }
        ];

        const shopItems = [
            { id: "click_up", name: "⚡️ Сила Клика", baseCost: 50, income: 0, isClick: true },
            { id: "it_team", name: "💻 IT Отдел", baseCost: 150, income: 2 },
            { id: "ads", name: "📺 Реклама", baseCost: 1000, income: 12 },
            { id: "bank", name: "🏦 Банк", baseCost: 10000, income: 120 }
        ];

        const skins = [
            { icon: '🐹', name: 'Обычный', price: 0 },
            { icon: '🤵', name: 'Магнат', price: 2500 },
            { icon: '😎', name: 'Стиляга', price: 15000 },
            { icon: '👑', name: 'Монарх', price: 100000 }
        ];

        // --- 2. АВТОМАТИЧЕСКИЙ БОНУС ---
        function checkReferral() {
            const urlParams = new URLSearchParams(window.location.search);
            // Telegram передает параметры через tgWebAppStartParam
            const isRef = urlParams.get('tgWebAppStartParam'); 
            
            if (isRef && !state.bonusReceived) {
                state.balance += 1500;
                state.bonusReceived = true;
                alert("🎉 Вы получили 1,500 монет по реферальной ссылке!");
                updateUI();
            }
        }

        // --- 3. ЛОГИКА ---
        function getLevel() {
            let res = levels[0];
            levels.forEach(l => { if (state.highscore >= l.threshold) res = l; });
            return res;
        }

        function getCost(item) {
            const lv = state.upgrades[item.id] || 0;
            return Math.floor(item.baseCost * Math.pow(1.3, lv));
        }

        function updateUI() {
            const lvl = getLevel();
            const maxEng = 1000 + (levels.indexOf(lvl) * 500);

            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            if (state.balance > state.highscore) state.highscore = state.balance;
            document.getElementById('highscore').innerText = Math.floor(state.highscore).toLocaleString();
            document.getElementById('level-display').innerText = `Ранг: ${lvl.name}`;
            document.getElementById('pps').innerText = state.pps.toFixed(1);
            document.getElementById('energy-text').innerText = Math.floor(state.energy);
            document.getElementById('max-energy-text').innerText = maxEng;
            document.getElementById('energy-fill').style.width = (state.energy / (maxEng / 100)) + '%';
            document.getElementById('hamster-view').innerText = state.currentSkin;

            localStorage.setItem(SAVE_KEY, JSON.stringify(state));
            renderShop();
            renderWardrobe();
        }

        function renderShop() {
            const container = document.getElementById('tab-upgrades');
            container.innerHTML = '';
            shopItems.forEach(item => {
                const cost = getCost(item);
                const lv = state.upgrades[item.id] || 0;
                const canBuy = state.balance >= cost;
                container.innerHTML += `<div class="card">
                    <h3>${item.name}</h3>
                    <p>${item.isClick ? '+ Сила клика' : '+'+item.income+'/с'} (Ур. ${lv})</p>
                    <button class="${canBuy ? 'btn-buy' : 'btn-disabled'}" onclick="buyUpgrade('${item.id}')" ${!canBuy ? 'disabled' : ''}>💰 ${cost.toLocaleString()}</button>
                </div>`;
            });
        }

        function renderWardrobe() {
            const container = document.getElementById('tab-wardrobe');
            container.innerHTML = '';
            skins.forEach(skin => {
                const owned = state.ownedSkins.includes(skin.icon);
                const active = state.currentSkin === skin.icon;
                let btn = active ? `<button class="btn-disabled" disabled>Надето</button>` :
                          owned ? `<button class="btn-equip" onclick="equipSkin('${skin.icon}')">Надеть</button>` :
                          `<button class="${state.balance >= skin.price ? 'btn-buy' : 'btn-disabled'}" onclick="buySkin('${skin.icon}', ${skin.price})">💰 ${skin.price.toLocaleString()}</button>`;
                container.innerHTML += `<div class="card"><div style="font-size:40px">${skin.icon}</div><h3>${skin.name}</h3>${btn}</div>`;
            });
        }

        window.buyUpgrade = (id) => {
            const item = shopItems.find(i => i.id === id);
            const cost = getCost(item);
            if (state.balance >= cost) {
                state.balance -= cost;
                state.upgrades[id] = (state.upgrades[id] || 0) + 1;
                if (!item.isClick) state.pps += item.income;
                updateUI();
            }
        };

        window.buySkin = (icon, price) => {
            if (state.balance >= price) {
                state.balance -= price;
                state.ownedSkins.push(icon);
                state.currentSkin = icon;
                updateUI();
            }
        };

        window.equipSkin = (icon) => { state.currentSkin = icon; updateUI(); };

        window.showTab = (tab) => {
            document.getElementById('tab-upgrades').classList.toggle('hidden', tab !== 'upgrades');
            document.getElementById('tab-wardrobe').classList.toggle('hidden', tab !== 'wardrobe');
            document.getElementById('tab-friends').classList.toggle('hidden', tab !== 'friends');
            document.getElementById('tab-upg-btn').classList.toggle('active', tab === 'upgrades');
            document.getElementById('tab-ward-btn').classList.toggle('active', tab === 'wardrobe');
            document.getElementById('tab-friends-btn').classList.toggle('active', tab === 'friends');
        };

        window.inviteFriend = () => {
            const botUser = "YOUR_BOT_NAME"; // ЗАМЕНИ НА ИМЯ БОТА
            const link = `https://t.me{botUser}?startapp=referral`;
            window.open(`https://t.me{link}&text=Давай тапать вместе!`, '_blank');
        };

        document.getElementById('clicker').addEventListener('click', (e) => {
            const pwr = 1 + (state.upgrades['click_up'] || 0);
            if (state.energy >= 1) {
                state.balance += pwr;
                state.energy -= 1;
                showFloat(e.clientX, e.clientY, pwr);
                updateUI();
            }
        });

        function showFloat(x, y, v) {
            const el = document.createElement('div');
            el.className = 'floating-text'; el.innerText = `+${v}`;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        setInterval(() => {
            state.balance += (state.pps / 10);
            const maxE = 1000 + (levels.indexOf(getLevel()) * 500);
            if (state.energy < maxE) state.energy = Math.min(maxE, state.energy + 1.5);
            updateUI();
        }, 100);

        // Инициализация при загрузке
        window.onload = () => {
            checkReferral();
            updateUI();
            if (window.Telegram?.WebApp) window.Telegram.WebApp.expand();
        };
    </script>
</body>
</html>
