<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phone Clicker</title>
    <style>
        body { 
            background: #111; color: #fff; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; overflow: hidden;
        }
        #score { font-size: 50px; margin-bottom: 20px; color: #ffd700; }
        #coin { 
            width: 250px; height: 250px; background: radial-gradient(#ffe082, #ffa000); 
            border-radius: 50%; border: 10px solid #fff; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            display: flex; align-items: center; justify-content: center; 
            font-size: 100px; cursor: pointer; transition: transform 0.05s;
        }
        #coin:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div id="coin">🔘</div>

    <script>
        let count = 0;
        const score = document.getElementById('score');
        const coin = document.getElementById('coin');

        // Вибрация и звук для телефона
        coin.addEventListener('touchstart', (e) => {
            e.preventDefault(); // чтобы экран не дергался при нажатии
            count++;
            score.innerText = count;
            if (navigator.vibrate) navigator.vibrate(50); // телефон слегка дрожит
        });
    </script>
</body>
</html>
