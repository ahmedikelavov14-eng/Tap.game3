<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tap Game</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: white; /* Белый фон */
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #score {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #tap-button {
            width: 200px;
            height: 200px;
            background-color: #f0f0f0;
            border-radius: 50%;
            border: 5px solid #333;
            font-size: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        #tap-button:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div id="score">0</div>
    <div id="tap-button">👟</div>

    <script>
        let score = parseInt(localStorage.getItem('tap_score')) || 0;
        const scoreElement = document.getElementById('score');
        const btn = document.getElementById('tap-button');

        scoreElement.innerText = score;

        btn.addEventListener('click', () => {
            score++;
            scoreElement.innerText = score;
            // Сохранение в браузере (даже если закрыть вкладку)
            localStorage.setItem('tap_score', score);
        });
    </script>
</body>
</html>
