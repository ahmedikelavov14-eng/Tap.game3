<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хамстер Тапай - Полная Версия</title>
    <style>
        :root {
            --bg-color: #1c1f24;
            --main-yellow: #f3ba2f;
            --card-bg: #2b2f36;
            --accent-green: #4caf50;
            --text-gray: #888;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* Шапка */
        .header { text-align: center; margin-bottom: 10px; width: 100%; }
        #level-display { color: var(--accent-green); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; font-size: 14px; }
        #balance { font-size: 48px; font-weight: bold; color: var(--main-yellow); line-height: 1; margin: 5px 0; }
        .record-badge { color: #ffd700; font-size: 14px; opacity: 0.9; }
        .income-info { font-size: 14px; color: var(--text-gray); margin-top: 5px; }

        /* Хомяк */
        .coin-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .coin-container:active { transform: scale(0.92); }
        .hamster-btn {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #f3ba2f 0%, #a67c00 100%);
            border-radius: 50%;
            border: 6px solid #3e444e;
            display: flex; align-items: center; justify-content: center;
            font-size: 90px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        /* Энергия */
        .energy-section { width: 100%; max-width: 320px; text-align: center; margin-bottom: 20px; }
        .energy-bar {
            width: 100%; height: 14px; background: #3e444e;
            border-radius: 7px; overflow: hidden; margin: 8px 0;
        }
        #energy-fill { width: 100%; height: 100%; background: var(--main-yellow); transition: width 0.2s; }

        /* Табы (Меню) */
        .tabs { display: flex; gap: 8px; width: 100%; max-width: 420px; }
        .tab-btn {
            flex: 1; padding: 12px 5px; border: none; background: #3e444e;
            color: white; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 12px;
        }
        .tab-btn.active { background: var(--main-yellow); color: black; }

        /* Списки и Карточки */
        .shop-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            width: 100%; max-width: 420px; margin-top: 15px;
        }
        .card {
            background: var(--card-bg); padding: 15px; border-radius: 15px;
            text-align: center; border: 1px solid #3e444e; display: flex; flex-direction: column;
        }
        .card h3 { margin: 0; font-size: 14px; }
        .card p { margin: 6px 0; font-size: 11px; color: var(--text-gray); }
        .card button {
            margin-top: auto; padding: 10px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer;
        }
        .btn-buy { background: var(--main-yellow); color: black; }
        .btn-equip { background: var(--accent-green); color: white; }
        .btn-disabled { background: #555; color: #888; cursor: not-allowed; }

        .hidden { display: none; }

        /* Анимация +Число */
        .floating-text {
            position: absolute; color: white; font-weight: bold; font-size: 32px;
            pointer-events: none; animation: floatUp 0.7s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="level-display">Ранг: Загрузка...</div>
        <div id="balance">0</div>
        <div class="record-badge">🏆 Рекорд за всё время: <span id="highscore">0</span></div>
        <div class="income-info">Прибыль в сек: +<span id="pps">0</span></div>
    </div>

    <div class="coin-container" id="clicker">
        <div class="hamster-btn" id="hamster-view">🐹</div>
    </div>

    <div class="energy-section">
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <small>⚡️ <span id="energy-text">1000</span> / <span id="max-energy-text">1000</span></small>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-upg-btn" onclick="showTab('upgrades')">Бизнес</button>
        <button class="tab-btn" id="tab-ward-btn" onclick="showTab('wardrobe')">Одежда</button>
        <button class="tab-btn" id="tab-friends-btn" onclick="showTab('friends')">Друзья</button>
    </div>

    <!-- Вкладки контента -->
    <div id="tab-upgrades" class="shop-grid"></div>
    <div id="tab-wardrobe" class="shop-grid hidden"></div>
    <div id="tab-friends" class="shop-grid hidden" style="grid-template-columns: 1fr;">
        <div class="card" style="padding: 25px;">
            <h3>Пригласи друзей</h3>
            <p>Получи 1,500 монет мгновенно!</p>
            <div style="font-size: 60px; margin: 15px;">👥</div>
            <button class="btn-buy" onclick="inviteFriend()" style="margin-bottom: 12px; font-size: 16px;">Позвать друга</button>
            <button class="btn-equip" onclick="claimFriendBonus()">Забрать бонус (+1500)</button>
        </div>
    </div>

    <script>
        // --- 1. ЗАЩИТА ДАННЫХ И МИГРАЦИЯ ---
        const SAVE_KEY = 'hamster_tapai_v1';
        const DEFAULT_STATE = {
            balance: 0,
            highscore: 0,
            energy: 1000,
            pps: 0,
            currentSkin: '🐹',
            ownedSkins: ['🐹'],
            upgrades: {},
            lastOnline: Date.now()
        };

        // Загрузка
        let savedData = JSON.parse(localStorage.getItem(SAVE_KEY)) || {};
        let state = { ...DEFAULT_STATE, ...savedData };

        // --- 2. КОНФИГУРАЦИЯ ---
        const levels = [
            { name: "Новичок", threshold: 0 },
            { name: "Тапер-Любитель", threshold: 2000 },
            { name: "Бизнес-Хомяк", threshold: 15000 },
            { name: "Директор Норки", threshold: 80000 },
            { name: "Крипто-Магнат", threshold: 300000 },
            { name: "Повелитель Семян", threshold: 1000000 }
        ];

        const shopItems = [
            { id: "click_power", name: "⚡️ Сила Тапа", baseCost: 40, income: 0, isClick: true },
            { id: "it_dev", name: "💻 Разработчик", baseCost: 150, income: 2 },
            { id: "marketing", name: "📊 Маркетинг", baseCost: 1000, income: 10 },
            { id: "mining_farm", name: "⛏ Ферма", baseCost: 6000, income: 65 }
        ];

        const skins = [
            { icon: '🐹', name: 'Классика', price: 0 },
            { icon: '🤵', name: 'Бизнесмен', price: 1000 },
            { icon: '😎', name: 'Крутой', price: 10000 },
            { icon: '👑', name: 'Король', price: 50000 },
            { icon: '👽', name: 'Пришелец', price: 150000 },
            { icon: '🤖', name: 'Робо-Тап', price: 500000 }
        ];

        // --- 3. ЛОГИКА ИГРЫ ---
        function getLevel() {
            let res = levels[0];
            levels.forEach(l => { if (state.highscore >= l.threshold) res = l; });
            return res;
        }

        function getCost(item) {
            const lv = state.upgrades[item.id] || 0;
            return Math.floor(item.baseCost * Math.pow(1.28, lv));
        }

        function updateUI() {
            const currentLevel = getLevel();
            const maxEng = 1000 + (levels.indexOf(currentLevel) * 500);

            // Тексты
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            if (state.balance > state.highscore) state.highscore = state.balance;
            document.getElementById('highscore').innerText = Math.floor(state.highscore).toLocaleString();
            document.getElementById('level-display').innerText = `Ранг: ${currentLevel.name}`;
            document.getElementById('pps').innerText = state.pps.toFixed(1);
            document.getElementById('energy-text').innerText = Math.floor(state.energy);
            document.getElementById('max-energy-text').innerText = maxEng;
            document.getElementById('hamster-view').innerText = state.currentSkin;
            
            // Прогресс-бар энергии
            document.getElementById('energy-fill').style.width = (state.energy / (maxEng / 100)) + '%';

            localStorage.setItem(SAVE_KEY, JSON.stringify(state));
            renderShop();
            renderWardrobe();
        }

        function renderShop() {
            const container = document.getElementById('tab-upgrades');
            container.innerHTML = '';
            shopItems.forEach(item => {
                const cost = getCost(item);
                const lv = state.upgrades[item.id] || 0;
                const canBuy = state.balance >= cost;
                container.innerHTML += `
                    <div class="card">
                        <h3>${item.name}</h3>
                        <p>${item.isClick ? '+ Сила клика' : '+'+item.income+'/сек'} (Ур. ${lv})</p>
                        <button class="${canBuy ? 'btn-buy' : 'btn-disabled'}" 
                                onclick="buyUpgrade('${item.id}')" ${!canBuy ? 'disabled' : ''}>
                            💰 ${cost.toLocaleString()}
                        </button>
                    </div>`;
            });
        }

        function renderWardrobe() {
            const container = document.getElementById('tab-wardrobe');
            container.innerHTML = '';
            skins.forEach(skin => {
                const isOwned = state.ownedSkins.includes(skin.icon);
                const isEquipped = state.currentSkin === skin.icon;
                const canBuy = state.balance >= skin.price;
                
                let btn;
                if (isEquipped) btn = `<button class="btn-disabled" disabled>Надето</button>`;
                else if (isOwned) btn = `<button class="btn-equip" onclick="equipSkin('${skin.icon}')">Надеть</button>`;
                else btn = `<button class="${canBuy ? 'btn-buy' : 'btn-disabled'}" onclick="buySkin('${skin.icon}', ${skin.price})" ${!canBuy ? 'disabled' : ''}>💰 ${skin.price.toLocaleString()}</button>`;

                container.innerHTML += `
                    <div class="card">
                        <div style="font-size:45px; margin-bottom:5px;">${skin.icon}</div>
                        <h3>${skin.name}</h3>
                        ${btn}
                    </div>`;
            });
        }

        // --- 4. ДЕЙСТВИЯ ---
        window.buyUpgrade = (id) => {
            const item = shopItems.find(i => i.id === id);
            const cost = getCost(item);
            if (state.balance >= cost) {
                state.balance -= cost;
                state.upgrades[id] = (state.upgrades[id] || 0) + 1;
                if (!item.isClick) state.pps += item.income;
                updateUI();
            }
        };

        window.buySkin = (icon, price) => {
            if (state.balance >= price) {
                state.balance -= price;
                state.ownedSkins.push(icon);
                state.currentSkin = icon;
                updateUI();
            }
        };

        window.equipSkin = (icon) => { state.currentSkin = icon; updateUI(); };

        window.showTab = (tab) => {
            document.getElementById('tab-upgrades').classList.toggle('hidden', tab !== 'upgrades');
            document.getElementById('tab-wardrobe').classList.toggle('hidden', tab !== 'wardrobe');
            document.getElementById('tab-friends').classList.toggle('hidden', tab !== 'friends');
            document.getElementById('tab-upg-btn').classList.toggle('active', tab === 'upgrades');
            document.getElementById('tab-ward-btn').classList.toggle('active', tab === 'wardrobe');
            document.getElementById('tab-friends-btn').classList.toggle('active', tab === 'friends');
        };

        window.inviteFriend = () => {
            const text = encodeURIComponent("Заходи в Хамстер Тапай! Давай кликать вместе!");
            window.open(`https://t.me{text}`, '_blank');
        };

        window.claimFriendBonus = () => {
            state.balance += 1500;
            updateUI();
            alert("Бонус 1,500 монет зачислен!");
        };

        // Клик
        document.getElementById('clicker').addEventListener('click', (e) => {
            const power = 1 + (state.upgrades['click_power'] || 0);
            if (state.energy >= 1) {
                state.balance += power;
                state.energy -= 1;
                showFloat(e.clientX, e.clientY, power);
                updateUI();
            }
        });

        function showFloat(x, y, val) {
            const el = document.createElement('div');
            el.className = 'floating-text'; el.innerText = `+${val}`;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        // --- 5. ЦИКЛ ИГРЫ (10 раз в сек) ---
        setInterval(() => {
            // Пассивный доход
            state.balance += (state.pps / 10);
            
            // Реген энергии
            const currentLevel = getLevel();
            const maxEng = 1000 + (levels.indexOf(currentLevel) * 500);
            if (state.energy < maxEng) {
                state.energy = Math.min(maxEng, state.energy + 1.5);
            }
            
            updateUI();
        }, 100);

        updateUI();
    </script>
</body>
</html>
