<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хамстер Тапай</title>
    <style>
        :root {
            --bg-color: #1c1f24;
            --main-yellow: #f3ba2f;
            --card-bg: #2b2f36;
            --accent-green: #4caf50;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            user-select: none;
        }

        /* Шапка игры */
        .header { text-align: center; margin-bottom: 10px; }
        #level-display { color: var(--accent-green); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #balance { font-size: 48px; font-weight: bold; color: var(--main-yellow); line-height: 1; margin: 5px 0; }
        .record-badge { color: #ffd700; font-size: 14px; }
        .income-info { font-size: 14px; color: #888; margin-top: 5px; }

        /* Главный герой - Хомяк */
        .coin-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .coin-container:active { transform: scale(0.92); }
        .hamster-btn {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #f3ba2f 0%, #a67c00 100%);
            border-radius: 50%;
            border: 6px solid #3e444e;
            display: flex; align-items: center; justify-content: center;
            font-size: 80px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        /* Энергия */
        .energy-section { width: 100%; max-width: 300px; text-align: center; margin-bottom: 20px; }
        .energy-bar {
            width: 100%; height: 12px; background: #3e444e;
            border-radius: 6px; overflow: hidden; margin: 5px 0;
        }
        #energy-fill { width: 100%; height: 100%; background: var(--main-yellow); transition: width 0.2s; }

        /* Вкладки */
        .tabs { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: #3e444e;
            color: white; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        .tab-btn.active { background: var(--main-yellow); color: black; }

        /* Списки товаров */
        .shop-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            width: 100%; max-width: 400px; margin-top: 15px;
        }
        .card {
            background: var(--card-bg); padding: 15px; border-radius: 12px;
            text-align: center; border: 1px solid #3e444e; display: flex; flex-direction: column;
        }
        .card h3 { margin: 0; font-size: 14px; }
        .card p { margin: 5px 0; font-size: 11px; color: #aaa; }
        .card button {
            margin-top: auto; padding: 8px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer;
        }
        .btn-buy { background: var(--main-yellow); color: black; }
        .btn-equip { background: var(--accent-green); color: white; }
        .btn-disabled { background: #555; color: #888; cursor: not-allowed; }

        .hidden { display: none; }

        /* Анимация клика */
        .floating-text {
            position: absolute; color: white; font-weight: bold; font-size: 28px;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="level-display">Ранг: Новичок</div>
        <div id="balance">0</div>
        <div class="record-badge">🏆 Лучшее: <span id="highscore">0</span></div>
        <div class="income-info">Прибыль: +<span id="pps">0</span> /сек</div>
    </div>

    <div class="coin-container" id="clicker">
        <div class="hamster-btn" id="hamster-view">🐹</div>
    </div>

    <div class="energy-section">
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <small>⚡️ <span id="energy-text">1000</span> / <span id="max-energy-text">1000</span></small>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-upg-btn" onclick="showTab('upgrades')">Бизнес</button>
        <button class="tab-btn" id="tab-ward-btn" onclick="showTab('wardrobe')">Гардероб</button>
    </div>

    <div id="tab-upgrades" class="shop-grid"></div>
    <div id="tab-wardrobe" class="shop-grid hidden"></div>

    <script>
        // Данные игры
        let state = {
            balance: parseFloat(localStorage.getItem('ht_bal')) || 0,
            highscore: parseFloat(localStorage.getItem('ht_high')) || 0,
            energy: parseFloat(localStorage.getItem('ht_eng')) || 1000,
            pps: parseFloat(localStorage.getItem('ht_pps')) || 0,
            currentSkin: localStorage.getItem('ht_skin') || '🐹',
            ownedSkins: JSON.parse(localStorage.getItem('ht_owned')) || ['🐹'],
            upgrades: JSON.parse(localStorage.getItem('ht_upg')) || {}
        };

        const levels = [
            { name: "Новичок", threshold: 0 },
            { name: "Бронзовый Тапер", threshold: 1000 },
            { name: "Серебряный Магнат", threshold: 10000 },
            { name: "Золотой Хомяк", threshold: 50000 },
            { name: "Алмазный Босс", threshold: 200000 },
            { name: "Крипто Король", threshold: 1000000 }
        ];

        const shopItems = [
            { id: "click_power", name: "⚡️ Сила тапа", baseCost: 100, income: 0, isClick: true },
            { id: "it_team", name: "👨‍💻 IT Отдел", baseCost: 150, income: 1.5 },
            { id: "marketing", name: "📢 Реклама", baseCost: 800, income: 8 },
            { id: "factory", name: "🏭 Фабрика", baseCost: 5000, income: 45 }
        ];

        const skins = [
            { icon: '🐹', name: 'Обычный', price: 0 },
            { icon: '🤵', name: 'Бизнесмен', price: 2000 },
            { icon: '😎', name: 'Крутой', price: 15000 },
            { icon: '👑', name: 'Король', price: 100000 },
            { icon: '👽', name: 'Пришелец', price: 500000 }
        ];

        function getLevelInfo() {
            let current = levels[0];
            levels.forEach(l => { if (state.highscore >= l.threshold) current = l; });
            return current;
        }

        function getCost(item) {
            const count = state.upgrades[item.id] || 0;
            return Math.floor(item.baseCost * Math.pow(1.2, count));
        }

        function updateUI() {
            const lvl = getLevelInfo();
            const maxEng = 1000 + (levels.indexOf(lvl) * 500);

            // Баланс и Рекорд
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            if (state.balance > state.highscore) state.highscore = state.balance;
            document.getElementById('highscore').innerText = Math.floor(state.highscore).toLocaleString();
            
            // Тексты
            document.getElementById('level-display').innerText = `Ранг: ${lvl.name}`;
            document.getElementById('pps').innerText = state.pps.toFixed(1);
            document.getElementById('energy-text').innerText = Math.floor(state.energy);
            document.getElementById('max-energy-text').innerText = maxEng;
            document.getElementById('energy-fill').style.width = (state.energy / (maxEng / 100)) + '%';
            document.getElementById('hamster-view').innerText = state.currentSkin;

            // Сохранение
            localStorage.setItem('ht_bal', state.balance);
            localStorage.setItem('ht_high', state.highscore);
            localStorage.setItem('ht_eng', state.energy);
            localStorage.setItem('ht_pps', state.pps);
            localStorage.setItem('ht_skin', state.currentSkin);
            localStorage.setItem('ht_owned', JSON.stringify(state.ownedSkins));
            localStorage.setItem('ht_upg', JSON.stringify(state.upgrades));

            renderShop();
            renderWardrobe();
        }

        function renderShop() {
            const container = document.getElementById('tab-upgrades');
            container.innerHTML = '';
            shopItems.forEach(item => {
                const cost = getCost(item);
                const lv = state.upgrades[item.id] || 0;
                const canBuy = state.balance >= cost;
                container.innerHTML += `
                    <div class="card">
                        <h3>${item.name}</h3>
                        <p>${item.isClick ? '+ к тапу' : '+'+item.income+'/сек'} (Лвл ${lv})</p>
                        <button class="${canBuy ? 'btn-buy' : 'btn-disabled'}" 
                                onclick="buyUpgrade('${item.id}')" ${!canBuy ? 'disabled' : ''}>
                            💰 ${cost}
                        </button>
                    </div>`;
            });
        }

        function renderWardrobe() {
            const container = document.getElementById('tab-wardrobe');
            container.innerHTML = '';
            skins.forEach(skin => {
                const isOwned = state.ownedSkins.includes(skin.icon);
                const isEquipped = state.currentSkin === skin.icon;
                const canBuy = state.balance >= skin.price;
                
                let btn = isEquipped ? `<button class="btn-disabled" disabled>Надето</button>` :
                          isOwned ? `<button class="btn-equip" onclick="equipSkin('${skin.icon}')">Надеть</button>` :
                          `<button class="${canBuy ? 'btn-buy' : 'btn-disabled'}" onclick="buySkin('${skin.icon}', ${skin.price})" ${!canBuy ? 'disabled' : ''}>💰 ${skin.price}</button>`;

                container.innerHTML += `<div class="card"><div style="font-size:40px">${skin.icon}</div><h3>${skin.name}</h3>${btn}</div>`;
            });
        }

        window.buyUpgrade = (id) => {
            const item = shopItems.find(i => i.id === id);
            const cost = getCost(item);
            if (state.balance >= cost) {
                state.balance -= cost;
                state.upgrades[id] = (state.upgrades[id] || 0) + 1;
                if (!item.isClick) state.pps += item.income;
                updateUI();
            }
        };

        window.buySkin = (icon, price) => {
            if (state.balance >= price) {
                state.balance -= price;
                state.ownedSkins.push(icon);
                state.currentSkin = icon;
                updateUI();
            }
        };

        window.equipSkin = (icon) => { state.currentSkin = icon; updateUI(); };

        window.showTab = (tab) => {
            document.getElementById('tab-upgrades').classList.toggle('hidden', tab !== 'upgrades');
            document.getElementById('tab-wardrobe').classList.toggle('hidden', tab !== 'wardrobe');
            document.getElementById('tab-upg-btn').classList.toggle('active', tab === 'upgrades');
            document.getElementById('tab-ward-btn').classList.toggle('active', tab === 'wardrobe');
        };

        document.getElementById('clicker').addEventListener('click', (e) => {
            const tapValue = 1 + (state.upgrades['click_power'] || 0);
            if (state.energy >= 1) {
                state.balance += tapValue;
                state.energy -= 1;
                showPlus(e.clientX, e.clientY, tapValue);
                updateUI();
            }
        });

        function showPlus(x, y, val) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = `+${val}`;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        // Игровой цикл
        setInterval(() => {
            state.balance += (state.pps / 10);
            const maxEng = 1000 + (levels.indexOf(getLevelInfo()) * 500);
            if (state.energy < maxEng) state.energy = Math.min(maxEng, state.energy + 1);
            updateUI();
        }, 100);

        updateUI();
    </script>
</body>
</html>
